<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Under Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1b2735, #090a0f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            overflow: hidden;
        }

        /* Floating background glow */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            filter: blur(160px);
            opacity: 0.35;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-60px); }
            100% { transform: translateY(0px); }
        }

        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 1.2s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 32px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 30px 0;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .time-box {
            min-width: 80px;
        }

        .time-box span {
            display: block;
            font-size: 2rem;
            font-weight: 600;
        }

        .time-box small {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="glow"></div>

    <div class="container">
        <h1>🚧 Under Maintenance</h1>
        <p>
            We’re currently performing some upgrades to improve your experience.
            Please check back soon — we’ll be online shortly.
        </p>

        <div class="divider"></div>

        <!-- Countdown (optional) -->
        <div class="countdown" id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <small>Days</small>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <small>Hours</small>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <small>Minutes</small>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <small>Seconds</small>
            </div>
        </div>

        <div class="footer">
            © 2026 — Thank you for your patience
        </div>
    </div>

    <script>
        // OPTIONAL COUNTDOWN TIMER
        // Set your desired launch date here
        const launchDate = new Date("2026-05-01T10:00:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = 
                    "<p>We are back online 🚀</p>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((distance / (1000 * 60)) % 60);
            const seconds = Math.floor((distance / 1000) % 60);

            document.getElementById("days").textContent = String(days).padStart(2, "0");
            document.getElementById("hours").textContent = String(hours).padStart(2, "0");
            document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
            document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
        };

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
