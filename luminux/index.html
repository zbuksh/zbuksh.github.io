<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminux OS Concept</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="wallpaper"></div>
  <div class="noise"></div>

  <!-- Login Screen -->
  <section class="login-screen" id="loginScreen">
    <div class="login-glow"></div>
    <div class="login-card">
      <div class="login-avatar"><i class="fa-brands fa-linux"></i></div>
      <h1>Luminux</h1>
      <p class="login-subtitle">Linux inspired. Glass powered. Concept OS.</p>
      <div class="login-user">zain@luminux</div>
      <div class="password-wrap">
        <i class="fa-solid fa-lock"></i>
        <input id="passwordInput" type="password" placeholder="Password: zain" autocomplete="current-password" />
        <button id="loginBtn" title="Login"><i class="fa-solid fa-arrow-right"></i></button>
      </div>
      <p class="login-hint">Press Enter or use password <strong>zain</strong></p>
      <p class="login-error" id="loginError"></p>
    </div>
  </section>

  <div class="os-shell locked" id="osShell">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="system-logo" id="launcherBtn"><i class="fa-brands fa-linux"></i></button>
        <span class="active-app-name">Luminux OS</span>
      </div>
      <div class="topbar-center"><span id="dateText">Tuesday</span></div>
      <div class="topbar-right">
        <i class="fa-solid fa-wifi"></i><i class="fa-solid fa-volume-high"></i><i class="fa-solid fa-battery-three-quarters"></i>
        <span id="timeText">00:00</span>
        <button class="logout-btn" id="logoutBtn" title="Lock"><i class="fa-solid fa-lock"></i></button>
      </div>
    </header>

    <main class="desktop" id="desktop">
      <section class="desktop-widgets">
        <div class="glass-card hero-widget">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h1>Luminux</h1>
            <p>Linux inspired. Windows 12 concept polish. Mac-like fluidity.</p>
          </div>
          <div class="hero-orb"><i class="fa-brands fa-linux"></i></div>
        </div>
        <div class="glass-card system-widget">
          <div class="widget-row"><span>CPU</span><strong>28%</strong></div><div class="progress"><div style="width:28%"></div></div>
          <div class="widget-row"><span>RAM</span><strong>5.2 GB</strong></div><div class="progress"><div style="width:54%"></div></div>
          <div class="widget-row"><span>Storage</span><strong>148 GB Free</strong></div><div class="progress"><div style="width:67%"></div></div>
        </div>
      </section>

      <div class="desktop-icons">
        <button class="desktop-icon" data-app="files"><span><i class="fa-solid fa-folder"></i></span><p>Files</p></button>
        <button class="desktop-icon" data-app="browser"><span><i class="fa-solid fa-globe"></i></span><p>Browser</p></button>
        <button class="desktop-icon" data-app="terminal"><span><i class="fa-solid fa-terminal"></i></span><p>Terminal</p></button>
        <button class="desktop-icon" data-app="settings"><span><i class="fa-solid fa-gear"></i></span><p>Settings</p></button>
      </div>
    </main>

    <section class="launcher hidden" id="launcher">
      <div class="launcher-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search apps, files, commands..." /></div>
      <div class="launcher-grid">
        <button class="launcher-app" data-app="files"><i class="fa-solid fa-folder"></i><span>Files</span></button>
        <button class="launcher-app" data-app="browser"><i class="fa-solid fa-globe"></i><span>Browser</span></button>
        <button class="launcher-app" data-app="terminal"><i class="fa-solid fa-terminal"></i><span>Bash</span></button>
        <button class="launcher-app" data-app="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></button>
        <button class="launcher-app" data-app="monitor"><i class="fa-solid fa-chart-simple"></i><span>Monitor</span></button>
        <button class="launcher-app" data-app="notes"><i class="fa-solid fa-note-sticky"></i><span>Notes</span></button>
      </div>
    </section>

    <section class="window-layer" id="windowLayer"></section>

    <nav class="dock">
      <button class="dock-icon" data-app="files" title="Files"><i class="fa-solid fa-folder"></i></button>
      <button class="dock-icon" data-app="browser" title="Browser"><i class="fa-solid fa-globe"></i></button>
      <button class="dock-icon" data-app="terminal" title="Terminal"><i class="fa-solid fa-terminal"></i></button>
      <button class="dock-icon" data-app="settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
      <button class="dock-icon" data-app="monitor" title="System Monitor"><i class="fa-solid fa-chart-simple"></i></button>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
