<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaDesk Web OS</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="boot" class="boot-screen">
    <div class="boot-card">
      <div class="brand-orb"><i class="fa-brands fa-linux"></i></div>
      <h1>NovaDesk</h1>
      <p>Browser-native developer workspace</p>
      <button id="loginBtn"><i class="fa-solid fa-fingerprint"></i> Enter Session</button>
    </div>
  </div>

  <main id="desktop" class="desktop hidden">
    <header class="topbar">
      <div class="bar-left">
        <button id="launcherBtn" class="bar-btn"><i class="fa-solid fa-border-all"></i><span>Nova</span></button>
        <span id="activeAppMenu">Desktop</span>
      </div>
      <div id="clock" class="clock">--:--</div>
      <div class="tray">
        <button class="tray-btn" data-panel="searchPanel"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="tray-btn" data-panel="quickPanel"><i class="fa-solid fa-wifi"></i></button>
        <button class="tray-btn" data-panel="quickPanel"><i class="fa-brands fa-bluetooth-b"></i></button>
        <button class="tray-btn" data-panel="quickPanel"><i class="fa-solid fa-volume-high"></i></button>
        <button class="tray-btn" data-panel="notificationPanel"><i class="fa-regular fa-bell"></i><span class="badge">3</span></button>
        <button class="tray-btn" data-panel="quickPanel"><i class="fa-solid fa-shield-halved"></i></button>
        <button class="tray-btn" data-panel="quickPanel"><i class="fa-solid fa-user-astronaut"></i></button>
      </div>
    </header>

    <section id="desktopIcons" class="desktop-icons"></section>

    <section id="launcher" class="launcher panel hidden">
      <div class="search-wrap"><i class="fa-solid fa-magnifying-glass"></i><input id="launcherSearch" placeholder="Search apps, files, settings..." /></div>
      <div class="launcher-grid" id="launcherGrid"></div>
      <div class="launcher-footer"><button data-app="settings"><i class="fa-solid fa-gear"></i> Settings</button><button id="lockBtn"><i class="fa-solid fa-lock"></i> Lock</button></div>
    </section>

    <section id="quickPanel" class="quick panel hidden">
      <h3>Quick Settings</h3>
      <div class="quick-grid">
        <button><i class="fa-solid fa-wifi"></i><span>Wi‑Fi</span></button><button><i class="fa-brands fa-bluetooth-b"></i><span>Bluetooth</span></button>
        <button><i class="fa-solid fa-moon"></i><span>Dark</span></button><button><i class="fa-solid fa-shield"></i><span>VPN</span></button>
        <button><i class="fa-solid fa-bell-slash"></i><span>DND</span></button><button><i class="fa-solid fa-cloud-arrow-up"></i><span>Cloud Sync</span></button>
      </div>
      <label>Volume <input type="range" min="0" max="100" value="72"></label>
      <label>Brightness <input type="range" min="0" max="100" value="86"></label>
    </section>

    <section id="notificationPanel" class="notifications panel hidden">
      <h3>Notifications</h3>
      <div class="note"><i class="fa-solid fa-cloud"></i><div><b>Cloud sync complete</b><p>9 files synced successfully.</p></div></div>
      <div class="note"><i class="fa-solid fa-terminal"></i><div><b>Terminal</b><p>Command finished with exit code 0.</p></div></div>
      <div class="note"><i class="fa-solid fa-box-archive"></i><div><b>Update available</b><p>NovaDesk modules can be refreshed.</p></div></div>
    </section>

    <section id="searchPanel" class="global-search panel hidden">
      <input id="globalSearch" placeholder="Type to search apps, files and commands" autofocus />
      <div id="searchResults"></div>
    </section>

    <div id="windows" class="windows"></div>

    <nav id="dock" class="dock"></nav>

    <div id="contextMenu" class="context-menu hidden"></div>
  </main>

  <template id="windowTemplate">
    <article class="window">
      <div class="titlebar">
        <div class="title"><i></i><span></span></div>
        <div class="win-controls"><button data-action="minimize"></button><button data-action="maximize"></button><button data-action="close"></button></div>
      </div>
      <div class="window-body"></div>
      <div class="resize-handle"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
